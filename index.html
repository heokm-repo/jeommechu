<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>점메추 - 오늘 뭐 먹지?</title>

  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="app-header">
    <div class="header-container">
      <div class="logo" data-link="home" role="button" tabindex="0" aria-label="홈으로 이동">
        <span class="material-symbols-rounded logo-icon">restaurant</span>
        <h1>점메추</h1>
      </div>
      <nav class="nav-menu" aria-label="주요 메뉴">
        <button class="nav-btn active" data-link="home" aria-label="홈">
          <span class="material-symbols-rounded">home</span>
        </button>
        <button class="nav-btn" data-link="favorites" aria-label="찜한 맛집">
          <span class="material-symbols-rounded">favorite</span>
        </button>
        <button class="nav-btn" data-link="history" aria-label="추천 기록">
          <span class="material-symbols-rounded">history</span>
        </button>
        <button class="nav-btn" data-link="profile" aria-label="마이페이지">
          <span class="material-symbols-rounded">person</span>
        </button>
      </nav>
    </div>
  </header>

  <main id="app-content" class="page-transition"></main>

  <div id="global-loader" class="loader-overlay hidden">
    <div class="spinner"></div>
    <p>맛있는 추천을 준비하고 있어요...</p>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="/app.js" type="module"></script>
</body>
</html>
