<div class="page-container">
  <div class="page-heading-row">
    <button type="button" class="btn-icon" data-navigate="profile" aria-label="뒤로 가기">
      <span class="material-symbols-rounded">arrow_back</span>
    </button>
    <h2 class="page-title-auth">로그인</h2>
  </div>

  <div class="card">
    <form id="login-form">
      <div class="input-group">
        <label for="login-email">이메일</label>
        <input type="email" id="login-email" class="input-text" placeholder="example@email.com" autocomplete="email" required>
      </div>
      <div class="input-group">
        <label for="login-password">비밀번호</label>
        <input type="password" id="login-password" class="input-text" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-primary mt-4">로그인하기</button>
    </form>
  </div>

  <div class="text-center auth-footer">
    <p class="auth-footer-text">
      아직 계정이 없으신가요?
      <button type="button" data-navigate="signup" class="link-button">회원가입</button>
    </p>
  </div>
</div>
