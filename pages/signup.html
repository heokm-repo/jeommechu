<div class="page-container">
  <div class="page-heading-row">
    <button type="button" class="btn-icon" data-navigate="profile" aria-label="뒤로 가기">
      <span class="material-symbols-rounded">arrow_back</span>
    </button>
    <h2 class="page-title-auth">회원가입</h2>
  </div>

  <div class="card">
    <form id="signup-form">
      <div class="input-group">
        <label for="signup-email">이메일</label>
        <input type="email" id="signup-email" class="input-text" placeholder="example@email.com" autocomplete="email" required>
      </div>
      <div class="input-group">
        <label for="signup-password">비밀번호</label>
        <input type="password" id="signup-password" class="input-text" placeholder="6자리 이상 입력해주세요" autocomplete="new-password" minlength="6" required>
      </div>
      <div class="input-group">
        <label for="signup-password-confirm">비밀번호 확인</label>
        <input type="password" id="signup-password-confirm" class="input-text" placeholder="비밀번호를 다시 입력해주세요" autocomplete="new-password" minlength="6" required>
      </div>

      <button type="submit" class="btn-primary mt-4">가입 완료</button>
    </form>
  </div>

  <div class="text-center auth-footer">
    <p class="auth-footer-text">
      이미 계정이 있으신가요?
      <button type="button" data-navigate="login" class="link-button">로그인</button>
    </p>
  </div>
</div>
